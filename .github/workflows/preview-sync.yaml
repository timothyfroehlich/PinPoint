# Preview Auto-Resync
#
# Keeps an ALREADY-ACTIVE preview branch DB in sync with the PR after a push
# that changes migrations or seed. Without this, `/preview` only migrates+seeds
# at comment time; later pushes trigger Vercel's own build but never re-run
# migrate/seed, so a pushed migration looks "not applied" and changed seed
# "not updated" until you remember to re-comment `/preview`. (Casework: PR #1388
# preview drift.)
#
# Zero-cost preserved: preview-resync.sh exits 0 immediately if there is no live
# `pr-<N>` branch, so pushes to PRs that never ran `/preview` do nothing. Path
# filter limits triggering to files that actually change the DB.
#
# Required GitHub Secrets (repo-level, same as preview-control's Supabase half):
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_ID

name: Preview Auto-Resync

on:
  pull_request:
    types: [synchronize]
    paths:
      - 'drizzle/**'
      - 'supabase/seed.sql'
      - 'supabase/seed-*.mjs'

# Least privilege: we only read the repo and talk to Supabase.
permissions:
  contents: read

# Share preview-control's per-PR group so a resync and a manual `/preview` never
# run concurrently against the same branch DB. cancel-in-progress:false queues
# the resync behind a running `/preview`; a new `/preview` (cancel-in-progress:
# true) supersedes an in-flight resync.
concurrency:
  group: preview-control-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  resync:
    name: Re-sync preview DB
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}  # zizmor: ignore[secrets-outside-env]
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}  # zizmor: ignore[secrets-outside-env]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          # PR head, so the PR's migrations, seed files, and the shared
          # preview-migrate-seed.sh are the ones that run.
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf  # ratchet:supabase/setup-cli@v2.1.1
        with:
          # Pinned Supabase CLI — bump deliberately (was: latest). PP-d5zn.
          version: 2.109.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # ratchet:pnpm/action-setup@v4.2.0
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Re-sync preview branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/workflow/preview/preview-resync.sh
