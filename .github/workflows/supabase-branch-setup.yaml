# Supabase Branch Setup for Preview Deployments
#
# When Supabase creates a preview branch database for a PR, this workflow:
# 1. Waits for the branch to be healthy
# 2. Runs Drizzle ORM migrations (creates all tables)
# 3. Runs seed.sql (FK constraints, triggers, schema grants)
# 4. Runs seed-users.mjs (creates Auth users + seed data)
#
# Required GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN - from supabase.com/dashboard/account/tokens (90-day expiry)
#   SUPABASE_PROJECT_ID   - production project ref (udhesuizjsgxfeotqybn)

name: Supabase Branch Setup

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions: read-all  # zizmor: ignore[excessive-permissions]

# Only one setup per PR at a time
concurrency:
  group: supabase-branch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wait-for-branch:
    name: Wait for Supabase Preview
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.conclusion }}
    steps:
      - uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be  # v1.2.0
        id: check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          timeoutSeconds: 300

  setup-branch:
    name: Migrate & Seed Branch DB
    needs: wait-for-branch
    if: needs.wait-for-branch.outputs.status == 'success'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}  # zizmor: ignore[secrets-outside-env]
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}  # zizmor: ignore[secrets-outside-env]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51  # v1.6.0
        with:
          version: latest

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get branch credentials
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -o pipefail
          supabase branches get "$BRANCH_NAME" -o env \
            | sed 's/="\(.*\)"/=\1/' >> "$GITHUB_ENV"

      - name: Validate credentials
        run: |
          missing=()
          for var in POSTGRES_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            [[ -z "${!var}" ]] && missing+=("$var")
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing env vars: ${missing[*]}. The 'Get branch credentials' step likely failed."
            echo "Common causes:"
            echo "  - SUPABASE_ACCESS_TOKEN expired (90-day default). Regenerate at:"
            echo "    https://supabase.com/dashboard/account/tokens"
            echo "  - Supabase preview branch was not created for this PR"
            exit 1
          fi
          echo "Branch credentials loaded (project: ${SUPABASE_URL##*/})"

      - name: Run Drizzle migrations
        env:
          DRIZZLE_FORCE_PRODUCTION: "1"
          POSTGRES_URL_NON_POOLING: ${{ env.POSTGRES_URL }}
        run: |
          # Use pooled connection (IPv4, port 6543) because GitHub Actions
          # runners cannot reach the direct connection (IPv6, port 5432).
          # Override POSTGRES_URL_NON_POOLING too since drizzle.config.ts
          # prefers it for directUrl.
          pnpm exec drizzle-kit migrate

      - name: Run seed SQL (triggers + grants)
        run: psql "$POSTGRES_URL" -f supabase/seed.sql

      - name: Seed users and data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: node supabase/seed-users.mjs
