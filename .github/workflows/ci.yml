          echo "Gating browsers green (Full). Mobile Safari failures (non-gating): $SAFARI_FAILS"

      - name: Summarize test failures
        if: failure()
        run: |
          {
            echo '## E2E Test Failures'
            echo ''
            echo '```'
            jq -r '.suites[].specs[] | select(.ok == false) | "FAIL: [\(.tests[0].projectName)] \(.title)"' \
