        run: |
          pnpm exec playwright test --config=playwright.config.smoke.ts \
            --project=chromium --project="Mobile Chrome" \
            --project="Mobile Safari" --workers=3

      - name: Evaluate gating browser results (Smoke)
        run: |
          RESULTS=playwright-report/results.json
          JQ_NAMES='.suites[].specs[] | select(.ok == false) | .tests[0].projectName'
          JQ_TITLES='.suites[].specs[] | select(.ok == false) | "[\(.tests[0].projectName)] \(.title)"'
          GATING_FAILS=$(jq -r "$JQ_NAMES" "$RESULTS" | grep -cvE '^Mobile Safari$' || true)
          if [ "$GATING_FAILS" -gt 0 ]; then
            echo 'Gating browser failures (Smoke):'
            jq -r "$JQ_TITLES" "$RESULTS" | grep -vE '^\[Mobile Safari\]'
            exit 1
          fi
          SAFARI_FAILS=$(jq -r "$JQ_NAMES" "$RESULTS" | grep -cE '^Mobile Safari$' || true)
          echo "Gating browsers green (Smoke). Mobile Safari failures (non-gating): $SAFARI_FAILS"

      - name: Run Comprehensive Full Tests (all browsers)
        continue-on-error: true
