name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - claude/**

permissions: read-all  # zizmor: ignore[excessive-permissions]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed to skip expensive jobs for non-app-code PRs.
  # "Non-app-code" covers: docs (docs/**, **/*.md), beads (.beads/**), agent
  # configs (.agent[s]/**, .claude/**), local dev / developer-utility scripts
  # (scripts/hooks/**, scripts/workflow/**), LICENSE, .gitignore. A few
  # scripts/workflow/** scripts DO run in CI (e.g. the preview/*.sh scripts via
  # the Preview Controller + Preview Reaper workflows), but none of them are
  # gated by PR CI, so skipping E2E when only those change is correct.
  # .github/** is intentionally NOT excluded — any change there directly
  # affects what CI runs, so we keep triggering E2E to validate it.
  #
  # Uses predicate-quantifier: 'every' with a positive '**' plus negative
  # exclusions. A changed file counts as "code" only when it matches every
  # pattern — i.e. it matches '**' (always) AND is NOT under any excluded
  # path. `has_code` is true if at least one changed file is "code". A
  # PR touching only excluded paths produces has_code=false and downstream
  # expensive jobs cascade-skip via `setup`'s `if:` gate. New / unknown
  # directories default to running full CI — the safe failure mode.
  #
  # Why 'every' and not 'some': under 'some', the positive '**' matches every
  # file by itself, short-circuiting the negative exclusions and forcing
  # has_code=true on every PR. PR #1327 / PP-r5v shipped 'some' and the
  # filter never fired (e.g. PR #1386, a single .agent/skills/*.md change,
  # still ran the full E2E suite).
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.set-code.outputs.code }}
      deps: ${{ steps.deps-filter.outputs.deps }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # ratchet:dorny/paths-filter@v4.0.2
        with:
          predicate-quantifier: "every"
          filters: |
            has_code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.beads/**'
              - '!.agent/**'
              - '!.agents/**'
              - '!.claude/**'
              - '!scripts/hooks/**'
              - '!scripts/workflow/**'
              - '!LICENSE'
              - '!.gitignore'
      # Separate filter for dependency changes using default "some" quantifier
      # so deps=true when ANY changed file is a dependency file (not ALL).
      - id: deps-filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # ratchet:dorny/paths-filter@v4.0.2
        with:
          filters: |
            deps:
              - 'package.json'
              - 'pnpm-lock.yaml'
      - name: Determine code changes
        id: set-code
        env:
          HAS_CODE: ${{ steps.filter.outputs.has_code }}
        run: |
          if [ "$HAS_CODE" = "true" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
  # Setup job caches dependencies for reuse by other jobs
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        run: pnpm run typecheck

      - name: Run test type checking (native tsc)
        run: pnpm run typecheck:tests

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint

  format:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format

  # Fast linters that always run — cheap enough to never skip.
  linters:
    name: Fast Linters
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install system linters
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint shellcheck

      - name: Install Ruff
        run: pipx install "ruff==0.15.1"

      - name: Install pytest
        run: pipx install "pytest==9.0.3"

      - name: YAML lint
        run: yamllint .github/workflows/

      - name: Action lint
        env:
          ACTIONLINT_VERSION: "1.7.11"
        run: |
          dl="https://raw.githubusercontent.com/rhysd/actionlint"
          dl="${dl}/main/scripts/download-actionlint.bash"
          bash <(curl -sL "$dl") "$ACTIONLINT_VERSION"
          find .github/workflows \( -name '*.yml' -o -name '*.yaml' \) \
            ! -name '*.lock.yml' -print0 | xargs -0 ./actionlint

      - name: Ruff check
        run: ruff check scripts/

      - name: Ruff format check
        run: ruff format --check scripts/

      - name: Pytest (scripts)
        run: pytest scripts/tests/

      - name: ShellCheck
        run: find scripts/ .devcontainer/ -name '*.sh' -print0 | xargs -0 shellcheck

      - name: Install zizmor
        run: |
          pipx install "zizmor==1.23.1"

      - name: Zizmor (GitHub Actions security)
        run: |
          find .github/workflows \( -name '*.yml' -o -name '*.yaml' \) \
            ! -name '*.lock.yml' -print0 | xargs -0 zizmor --min-severity low --format plain

      - name: Ratchet Check (pinned actions)
        uses: sethvargo/ratchet@43c2f868adf316878296666232da1c8d2733f159  # ratchet:sethvargo/ratchet@main
        with:
          files: |
            .github/workflows/ci.yml
            .github/workflows/preview-control.yaml
            .github/workflows/preview-reaper.yaml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [setup, typecheck, lint, format, linters, test-unit, test-integration]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: |
          # Load CI environment variables for build-time evaluation
          set -a
          source .env.ci
          set +a
          pnpm run build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: |
          set -a
          source .env.ci
          set +a
          pnpm run test:coverage -- --reporter=verbose


  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: |
          set -a
          source .env.ci
          set +a
          pnpm run test:integration -- --reporter=verbose

  # ==============================================================================
  # Migration Verification
  #
  # Validates that Drizzle migrations can apply cleanly to a fresh database.
  # Uses Supabase CLI since migrations reference auth.users (Supabase-specific).
  # This catches broken migrations before they reach production.
  # ==============================================================================
  test-migrations:
    name: Verify Migrations
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf  # ratchet:supabase/setup-cli@v2.1.1
        with:
          # Pinned Supabase CLI — bump deliberately (was: latest). PP-d5zn.
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Setup Supabase
        uses: ./.github/actions/setup-supabase
        with:
          seed: "false"

      - name: Apply migrations to fresh database
        run: pnpm run db:migrate

      - name: Verify migration metadata integrity
        run: pnpm run check:migrations

      - name: Ensure test schema is current
        run: |
          set -a
          source .env.ci
          set +a
          pnpm run test:ensure-schema

  test-integration-supabase:
    name: Supabase Integration Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.code == 'true' || needs.changes.outputs.deps == 'true') }}
    needs: [changes, setup, typecheck, lint, format, linters, test-unit, test-integration, test-migrations]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf  # ratchet:supabase/setup-cli@v2.1.1
        with:
          # Pinned Supabase CLI — bump deliberately (was: latest). PP-d5zn.
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Setup Supabase
        uses: ./.github/actions/setup-supabase

      - name: Run Supabase integration tests
        run: pnpm run test:integration:supabase -- --reporter=verbose

  test-e2e-smoke:
    # ==============================================================================
    # E2E Smoke Tests (Chromium Only)
    #
    # Runs smoke tests with chromium browser only for fast feedback.
    # ==============================================================================
    name: E2E Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.code == 'true' || needs.changes.outputs.deps == 'true') }}
    needs: [changes, setup, typecheck, lint, format, linters, test-unit, test-integration, test-migrations]
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
