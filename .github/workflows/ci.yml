  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # ratchet:gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c  # ratchet:pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # ratchet:actions/cache/restore@v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # PR head commit on pull_request events (github.sha is the ephemeral
          # merge commit there); the pushed commit on push events.
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          registry_errors="ERR_PNPM_AUDIT_BAD_RESPONSE"
          registry_errors+="|ERR_PNPM_AUDIT_REGISTRY"
          registry_errors+="|ECONNREFUSED|EAI_AGAIN|ETIMEDOUT"
          output=$(pnpm audit --audit-level=high 2>&1) || {
            if echo "$output" | grep -qE "$registry_errors"; then
              echo "::warning::pnpm audit skipped: registry error"
              echo "$output"
              exit 0
            fi
            echo "$output"
            # Per-PR escape hatch: a maintainer may bypass this gate for the
            # current commit via `/audit-override <reason>` (see
            # .github/workflows/audit-override.yaml). The override is a commit
            # status bound to HEAD_SHA, so it never carries to a new commit —
            # a newly-introduced advisory is never silently masked.
            if bash scripts/workflow/audit-override/gate.sh check "$HEAD_SHA"; then
              echo "::warning::pnpm audit bypassed by an active /audit-override on ${HEAD_SHA}. See the audit-override sticky comment for who/why."
              exit 0
            fi
            echo "::error::pnpm audit found advisories at or above 'high'. Fix them, or a maintainer can bypass for this PR with '/audit-override <reason>'."
            exit 1
          }
          echo "$output"

  # ==============================================================================
  # CI Gate (Aggregator)
  #
  # Two tiers of required jobs:
  #
  #   1. ALWAYS-RUNS (must succeed): linters, gitleaks
  #      These run on every PR including docs-only changes. Their `success` is
  #      strictly required - failure or cancellation fails the gate.
  #
  #   2. PATH-FILTERED (optional outcomes): build, lint, format, typecheck,
  #      test-*, pnpm-audit
  #      These only run when source changes. On docs-only PRs they cascade-skip
  #      because they depend on `setup` which is gated by `changes.outputs.code`.
  #      `skipped` and `cancelled` pass; only `failure` fails the gate.
  #
  # Why allow `cancelled`?
  #   - Cascade-skips from a gated `needs:` chain can surface as `cancelled`
  #     instead of `skipped` depending on how the runner schedules them.
  #   - Concurrency cancel-in-progress (when a new push supersedes an old run)
  #     marks queued jobs `cancelled`. The replacement run becomes the
  #     authoritative status, so it is safe to treat the cancelled run as pass.
  # ==============================================================================
  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - linters
      - gitleaks
      - build
      - lint
      - format
      - typecheck
      - test-unit
      - test-integration
      - test-migrations
      - test-integration-supabase
      - test-e2e-smoke
      - test-e2e-smoke-mobile-chrome
      - test-e2e-full-chromium
      - pnpm-audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Check required job results
        env:
          # Tier 1: always-runs jobs - must be `success`.
          LINTERS_RESULT: ${{ needs.linters.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          # Tier 2: path-filtered jobs - `failure` fails the gate;
          # `success`, `skipped`, and `cancelled` all pass.
          BUILD_RESULT: ${{ needs.build.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          FORMAT_RESULT: ${{ needs.format.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_UNIT_RESULT: ${{ needs.test-unit.result }}
          TEST_INTEGRATION_RESULT: ${{ needs.test-integration.result }}
          TEST_MIGRATIONS_RESULT: ${{ needs.test-migrations.result }}
          TEST_INTEGRATION_SUPABASE_RESULT: ${{ needs.test-integration-supabase.result }}
          TEST_E2E_SMOKE_RESULT: ${{ needs.test-e2e-smoke.result }}
          TEST_E2E_SMOKE_MOBILE_CHROME_RESULT: ${{ needs.test-e2e-smoke-mobile-chrome.result }}
          TEST_E2E_FULL_CHROMIUM_RESULT: ${{ needs.test-e2e-full-chromium.result }}
          PNPM_AUDIT_RESULT: ${{ needs.pnpm-audit.result }}
        run: |
          # Tier 1: always-runs jobs - must be `success`.
          required=("$LINTERS_RESULT" "$GITLEAKS_RESULT")
          for r in "${required[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::Always-runs job did not succeed (result=$r)"
              exit 1
            fi
          done

          # Tier 2: path-filtered jobs - `failure` fails; `success`, `skipped`,
          # and `cancelled` all pass. Cascade-skips on docs-only PRs and
          # concurrency cancellations are intentional and should not block merge.
          optional=("$BUILD_RESULT" "$LINT_RESULT" \
                    "$FORMAT_RESULT" "$TYPECHECK_RESULT" \
                    "$TEST_UNIT_RESULT" "$TEST_INTEGRATION_RESULT" \
                    "$TEST_MIGRATIONS_RESULT" "$TEST_INTEGRATION_SUPABASE_RESULT" \
                    "$TEST_E2E_SMOKE_RESULT" "$TEST_E2E_SMOKE_MOBILE_CHROME_RESULT" \
                    "$TEST_E2E_FULL_CHROMIUM_RESULT" "$PNPM_AUDIT_RESULT")
          for r in "${optional[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "::error::Path-filtered job failed (result=$r)"
              exit 1
            fi
          done
          echo "All required jobs passed; path-filtered jobs passed, were skipped, or were cancelled"
