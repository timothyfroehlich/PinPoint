# Preview Reaper
#
# TTL + closed-PR enforcement for on-demand Supabase preview branches.
# Supersedes the old supabase-branch-cleanup.yaml. Runs hourly and on demand.
#
# For each Supabase preview branch:
#   - PR closed/merged (or no open PR)  -> destroy the branch
#   - sticky comment `Expires:` in past -> destroy + flip comment to "expired"
#   - otherwise                         -> keep
#
# Required GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN - supabase.com/dashboard/account/tokens (90-day expiry)
#   SUPABASE_PROJECT_ID   - production project ref
#   VERCEL_TOKEN          - vercel.com/account/tokens (for env-var cleanup)
#   VERCEL_ORG_ID         - Vercel team/org id
#   VERCEL_PROJECT_ID     - Vercel project id

name: Preview Reaper

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-reaper
  cancel-in-progress: false

jobs:
  reap:
    name: Reap expired / closed-PR branches
    runs-on: ubuntu-latest
    # The Vercel secrets live in the `Preview` GitHub Environment, so the job
    # must declare it to read them. Repo-level secrets (SUPABASE_*) stay readable.
    environment: Preview
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}  # zizmor: ignore[secrets-outside-env]
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}  # zizmor: ignore[secrets-outside-env]
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}  # zizmor: ignore[secrets-outside-env]
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}  # zizmor: ignore[secrets-outside-env]
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}  # zizmor: ignore[secrets-outside-env]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf  # ratchet:supabase/setup-cli@v2.1.1
        with:
          # Pinned Supabase CLI — bump deliberately (was: latest). PP-d5zn.
          version: 2.109.1

      - name: Reap preview branches
        run: bash scripts/workflow/preview/preview-reap.sh
