version: 2
updates:
  # pnpm dependencies with different cooldowns per update type
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps)"
      include: "scope"
    # Cooldown: 2 weeks for minor/patch, 1 month for major
    cooldown:
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 14
    groups:
      # Group minor and patch updates together (Tiptap excluded — see the tiptap
      # group; it must move in lockstep and skews transiently. PP-sg3m)
      minor-patch-updates:
        applies-to: version-updates
        exclude-patterns:
          - "@tiptap/*"
        update-types:
          - "minor"
          - "patch"
      # Tiptap adapter packages import internal helpers from @tiptap/core that
      # only exist in the exactly-matching core version. Isolating them so a
      # transient skew (unpinned transitive core vs. cooldown-held direct deps)
      # never blocks the rest of the minor-patch group. PP-sg3m
      tiptap:
        applies-to: version-updates
        patterns:
          - "@tiptap/*"
        update-types:
          - "minor"
          - "patch"
      # Group minor and patch security updates
      security-updates:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "pnpm"
    # @typescript/native-preview is pinned to an exact TS7 nightly in package.json
    # (side-by-side with typescript@6 for the tsgo typecheck gate). Because the pin is
    # a prerelease and this ecosystem runs daily, Dependabot would propose a bump to
    # each newer nightly. We bump it by hand when TS 7 GA lands — see PP-rl1l and
    # docs/plans/2026-06-27-typescript-7-upgrade-plan.md.
    ignore:
      - dependency-name: "@typescript/native-preview"

  # GitHub Actions with 2-week cooldown
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps)"
      include: "scope"
    # 2 week cooldown for all GitHub Actions updates
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
      - "github-actions"
